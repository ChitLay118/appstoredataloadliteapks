name: Update LiteAPKs Data

on:
  schedule:
    - cron: '0 0 * * *' # နေ့တိုင်း ည ၁၂ နာရီမှာ အလိုအလျောက် run မယ်
  workflow_dispatch: # လိုအပ်ရင် Manual နှိပ်ပြီး run လို့ရအောင်

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub ထဲ ပြန်ရေးဖို့ permission ပေးတာ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "Auto-update apps.json" || exit 0
          git push
